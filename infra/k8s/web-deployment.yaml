apiVersion: apps/v1
kind: Deployment
metadata:
  name: qazaqlearn-web
  namespace: qazaqlearn
spec:
  replicas: 2
  selector:
    matchLabels:
      app: qazaqlearn-web
  template:
    metadata:
      labels:
        app: qazaqlearn-web
    spec:
      containers:
        - name: web
          image: qazaqlearn/web:0.1.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 80
          env:
            - name: VITE_API_URL
              value: /api/v1
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
