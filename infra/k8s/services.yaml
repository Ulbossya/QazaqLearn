apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: qazaqlearn
spec:
  selector:
    app: postgres
  ports:
    - name: pg
      port: 5432
      targetPort: 5432
  clusterIP: None
---
apiVersion: v1
kind: Service
metadata:
  name: qazaqlearn-api
  namespace: qazaqlearn
spec:
  selector:
    app: qazaqlearn-api
  ports:
    - name: http
      port: 3000
      targetPort: 3000
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: ai-java
  namespace: qazaqlearn
spec:
  selector:
    app: qazaqlearn-ai-java
  ports:
    - name: http
      port: 8080
      targetPort: 8080
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: qazaqlearn-web
  namespace: qazaqlearn
spec:
  selector:
    app: qazaqlearn-web
  ports:
    - name: http
      port: 80
      targetPort: 80
  type: ClusterIP
