apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: qazaqlearn
  namespace: qazaqlearn
spec:
  ingressClassName: nginx
  rules:
    - host: qazaqlearn.local
      http:
        paths:
          - path: /api/v1
            pathType: Prefix
            backend:
              service:
                name: qazaqlearn-api
                port:
                  number: 3000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: qazaqlearn-web
                port:
                  number: 80
