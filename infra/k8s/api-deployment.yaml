apiVersion: apps/v1
kind: Deployment
metadata:
  name: qazaqlearn-api
  namespace: qazaqlearn
spec:
  replicas: 2
  selector:
    matchLabels:
      app: qazaqlearn-api
  template:
    metadata:
      labels:
        app: qazaqlearn-api
    spec:
      containers:
        - name: api
          image: qazaqlearn/api:0.1.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: DATABASE_URL
              value: postgresql://qazaqlearn:$(POSTGRES_PASSWORD)@postgres:5432/qazaqlearn
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: qazaqlearn-secrets
                  key: POSTGRES_PASSWORD
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: qazaqlearn-secrets
                  key: JWT_SECRET
            - name: AI_SERVICE_URL
              value: http://ai-java:8080
            - name: APP_URL
              value: http://qazaqlearn.local
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
